name: Sync Core Scripts to Downstream

# ── PARKED (2026-07-14, planner + operator decision) ──────────────────────
# The push trigger is disabled: CROSS_REPO_TOKEN was never provisioned, so
# every push-triggered run failed at target checkout — 22/22 failures since
# 2026-03-09. Cross-repo sync is deferred until the downstream phase
# ("stabilize the kit first", operator 2026-07-04). workflow_dispatch is
# kept for deliberate runs once the token exists.
#
# TO RE-ENABLE (tracked in KIT-0045):
#   1. Mint a fine-grained PAT (owner: movito) scoped to EXACTLY:
#      dispatch-kit, adversarial-workflow, adversarial-evaluator-library
#      Permissions: Contents RW, Pull requests RW, Metadata R.
#   2. `gh secret set CROSS_REPO_TOKEN` in agentive-starter-kit
#      (paste the value locally — never through an agent transcript).
#   3. Verify with a single-repo dispatch run:
#      `gh workflow run "Sync Core Scripts to Downstream" -f repo=movito/dispatch-kit`
#   4. Restore the push trigger from git history (commit parking this file)
#      once someone is committed to tending the sync PRs in all 3 repos.
# ───────────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:
    inputs:
      repo:
        description: >-
          Sync only this downstream repo (owner/name). Leave blank to sync
          every repo in the matrix.
        required: false
        default: ''

jobs:
  # Fail fast on a mistyped workflow_dispatch `repo`: without this, an unknown
  # value skips every matrix step and the run goes green with no sync PR and no
  # error — a silent no-op the operator would read as success.
  validate-dispatch:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.repo != ''
    runs-on: ubuntu-latest
    steps:
      - name: Reject unknown repo input
        env:
          REPO: ${{ github.event.inputs.repo }}
        run: |
          case "$REPO" in
            movito/dispatch-kit|movito/adversarial-workflow|movito/adversarial-evaluator-library)
              echo "repo input valid: $REPO" ;;
            *)
              echo "::error::Unknown repo '$REPO'. Valid: movito/dispatch-kit, movito/adversarial-workflow, movito/adversarial-evaluator-library (or leave blank for all)."
              exit 1 ;;
          esac

  sync:
    needs: validate-dispatch
    # Run on push (validate-dispatch is skipped) and on dispatch with a valid
    # repo (validate-dispatch succeeds); skip only when validation failed.
    if: >-
      always()
      && (needs.validate-dispatch.result == 'success'
          || needs.validate-dispatch.result == 'skipped')
    runs-on: ubuntu-latest
    # Serialize per downstream repo so a push-triggered sync and a manual
    # workflow_dispatch cannot race on branch creation/push into the same target.
    concurrency:
      group: sync-core-scripts-${{ matrix.repo }}
      cancel-in-progress: false
    strategy:
      # fail-fast off: one repo's failure must not cancel (and thereby mask)
      # the sibling legs' real per-repo results — the 2026-07 diagnosis was
      # slowed by a 'cancelled' leg that had never actually run.
      fail-fast: false
      matrix:
        include:
          - repo: movito/dispatch-kit
            is_kit: true
          - repo: movito/adversarial-workflow
            is_kit: true
          - repo: movito/adversarial-evaluator-library
            is_kit: true
    steps:
      - name: Checkout source (agentive-starter-kit)
        if: >-
          github.event_name == 'push'
          || github.event.inputs.repo == ''
          || github.event.inputs.repo == matrix.repo
        uses: actions/checkout@v7
        with:
          path: source

      - name: Checkout target (${{ matrix.repo }})
        if: >-
          github.event_name == 'push'
          || github.event.inputs.repo == ''
          || github.event.inputs.repo == matrix.repo
        uses: actions/checkout@v7
        with:
          repository: ${{ matrix.repo }}
          token: ${{ secrets.CROSS_REPO_TOKEN }}
          path: target

      - name: Sync from manifest
        id: sync
        if: >-
          github.event_name == 'push'
          || github.event.inputs.repo == ''
          || github.event.inputs.repo == matrix.repo
        env:
          IS_KIT: ${{ matrix.is_kit }}
        run: |
          set -euo pipefail

          VERSION=$(cat source/scripts/core/VERSION)
          BRANCH="chore/core-scripts-sync-v${VERSION}-$(date +%Y%m%d%H%M%S)"

          # ── Create the sync branch in the target repo ──
          cd target
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          cd ..

          # ── Run the sync engine (one engine, two callers — KIT-ADR-0026) ──
          # All tier/path/opt-in/cleanup logic lives in the engine now; this
          # step is a thin shell around it.
          IS_KIT_FLAG=""
          if [ "${IS_KIT:-false}" = "true" ]; then
            IS_KIT_FLAG="--is-kit"
          fi

          set +e
          python3 source/scripts/core/sync_from_manifest.py \
            --source source --target target $IS_KIT_FLAG \
            --report-json sync-report.json
          RC=$?
          set -e
          # Exit-code contract: 0 clean/applied, 1 applied-with-warnings —
          # both are fine here. 2 (usage) / 3 (manifest) / 4 (source) are real
          # failures and must stop the run.
          if [ "$RC" -ge 2 ]; then
            echo "::error::sync engine failed with exit code $RC"
            exit "$RC"
          fi

          # ── Surface engine warnings into the PR body ──
          WARNINGS=""
          if [ -f sync-report.json ]; then
            WARNINGS=$(jq -r '.warnings[]?' sync-report.json \
              | sed 's/^/- **Warning**: /')
          fi

          # ── Commit and push if the engine changed anything ──
          cd target
          if [ -z "$(git status --porcelain)" ]; then
            echo "No changes to sync"
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "has_changes=true" >> "$GITHUB_OUTPUT"
          if [ -n "$WARNINGS" ]; then
            # Random delimiter: WARNINGS is engine-derived text, and a fixed
            # "EOF" could be closed early by a crafted/coincidental warning line
            # — a known GITHUB_OUTPUT injection vector.
            DELIM="EOF_$(openssl rand -hex 16)"
            {
              echo "warnings<<${DELIM}"
              echo "$WARNINGS"
              echo "${DELIM}"
            } >> "$GITHUB_OUTPUT"
          fi

          # Stage only the roots the manifest can target (scripts_core →
          # scripts/, commands_* → .claude/commands/, kit_builder → .kit/ and
          # .adversarial/). Scoped rather than `git add -A` so no unrelated
          # working-tree change is swept into the sync PR.
          for root in scripts .claude/commands .kit .adversarial; do
            if [ -e "$root" ]; then
              git add "$root"
            fi
          done
          git commit -m "chore: Sync core scripts v${VERSION} from agentive-starter-kit"
          git push -u origin "$BRANCH"

      - name: Create PR
        if: steps.sync.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
          WARNINGS: ${{ steps.sync.outputs.warnings }}
        run: |
          VERSION=$(cat source/scripts/core/VERSION)
          cd target
          BRANCH=$(git branch --show-current)

          BODY="Automated sync of core scripts, commands, and builder layer from agentive-starter-kit v${VERSION}.

          ## What's synced

          This PR updates files listed in \`.core-manifest.json\`:
          - **scripts_core**: Core scripts in \`scripts/core/\`
          - **commands_core**: Slash commands that depend on core scripts
          - **commands_optional**: Only if your repo has opted in via \`opted_in\` in the manifest
          - **kit_builder**: Builder layer (\`.kit/\`) — only synced to kit repos (\`is_kit: true\`)

          Files not listed in the manifest are **never touched** by this sync.

          ## Opting in to optional tiers

          To receive optional commands (e.g., \`/babysit-pr\`, \`/retro\`), add
          \`\"commands_optional\"\` to the \`opted_in\` array in \`scripts/.core-manifest.json\`.

          The \`kit_builder\` tier syncs automatically to kit repos and does not require opt-in.

          ${WARNINGS:+## Warnings
          ${WARNINGS}}

          **Source**: movito/agentive-starter-kit@main
          **Core version**: ${VERSION}
          **ADR**: KIT-ADR-0022 (Manifest-Based Sync Ownership), KIT-ADR-0026 (Pull-Based Consumer Sync)"

          gh pr create \
            --title "chore: Sync core scripts v${VERSION} from agentive-starter-kit" \
            --body "$BODY" \
            --base main
