name: Sync Core Scripts to Downstream

on:
  push:
    paths:
      - 'scripts/core/**'
      - '.claude/commands/**'
      - '.kit/templates/**'
      - '.kit/skills/**'
      - '.kit/launchers/**'
      - '.kit/decisions/**'
      - '.kit/docs/**'
      - '.kit/adversarial/scripts/**'
      - '.kit/adversarial/docs/**'
      - '.kit/adversarial/templates/**'
      - '.kit/adversarial/config.yml.template'
      - '.kit/context/workflows/**'
      - '.kit/context/templates/**'
      - '.kit/context/patterns.yml'
      - '.kit/context/AGENT-SYSTEM-GUIDE.md'
      - '.kit/tasks/9-reference/**'
      - 'scripts/.core-manifest.json'
    branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - repo: movito/dispatch-kit
            is_kit: true
          - repo: movito/adversarial-workflow
            is_kit: true
          - repo: movito/adversarial-evaluator-library
            is_kit: true
    steps:
      - name: Checkout source (agentive-starter-kit)
        uses: actions/checkout@v6
        with:
          path: source

      - name: Checkout target (${{ matrix.repo }})
        uses: actions/checkout@v6
        with:
          repository: ${{ matrix.repo }}
          token: ${{ secrets.CROSS_REPO_TOKEN }}
          path: target

      - name: Sync from manifest
        id: sync
        env:
          IS_KIT: ${{ matrix.is_kit }}
        run: |
          set -euo pipefail

          VERSION=$(cat source/scripts/core/VERSION)
          BRANCH="chore/core-scripts-sync-v${VERSION}-$(date +%Y%m%d%H%M%S)"
          UPSTREAM_MANIFEST="source/scripts/.core-manifest.json"
          DOWNSTREAM_MANIFEST="target/scripts/.core-manifest.json"
          WARNINGS=""

          # ── Read downstream opted_in (preserve across sync) ──
          DOWNSTREAM_OPTED_IN="[]"
          if [ -f "$DOWNSTREAM_MANIFEST" ]; then
            DOWNSTREAM_OPTED_IN=$(jq '.opted_in // []' "$DOWNSTREAM_MANIFEST")
          fi

          # ── Helper: check if a tier should be synced ──
          # Core tiers (*_core) always sync.
          # kit_builder syncs only to kit repos (is_kit=true).
          # Optional tiers sync if downstream has opted in.
          should_sync_tier() {
            local tier="$1"
            # Core tiers always sync
            if echo "$tier" | grep -q '_core$'; then
              return 0
            fi
            # kit_builder syncs only to kit repos
            if [ "$tier" = "kit_builder" ]; then
              [ "${IS_KIT:-false}" = "true" ]
              return $?
            fi
            # Check if tier is in downstream opted_in
            if echo "$DOWNSTREAM_OPTED_IN" | jq -e "index(\"$tier\")" > /dev/null 2>&1; then
              return 0
            fi
            return 1
          }

          # ── Helper: resolve source and target paths for a tier ──
          resolve_paths() {
            local tier="$1"
            local entry="$2"
            case "$tier" in
              scripts_core)
                echo "source/scripts/${entry}" "target/scripts/${entry}"
                ;;
              commands_*)
                echo "source/.claude/commands/${entry}" "target/.claude/commands/${entry}"
                ;;
              *)
                echo "source/${entry}" "target/${entry}"
                ;;
            esac
          }

          cd target
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          cd ..

          # ── Iterate manifest tiers and sync ──
          TIERS=$(jq -r '.files | keys[]' "$UPSTREAM_MANIFEST")
          for tier in $TIERS; do
            if ! should_sync_tier "$tier"; then
              echo "Skipping tier: $tier (not opted in or not a kit repo)"
              continue
            fi

            echo "Syncing tier: $tier"
            ENTRIES=$(jq -r ".files[\"$tier\"][]" "$UPSTREAM_MANIFEST")
            for entry in $ENTRIES; do
              read -r src_path tgt_path <<< "$(resolve_paths "$tier" "$entry")"

              # Directory entries end with /
              if [[ "$entry" == */ ]]; then
                if [ -d "$src_path" ]; then
                  # Remove stale target contents and copy fresh
                  src_clean="${src_path%/}"
                  tgt_clean="${tgt_path%/}"
                  rm -rf "$tgt_clean"
                  mkdir -p "$(dirname "$tgt_clean")"
                  cp -r "$src_clean" "$tgt_clean"
                  echo "  Synced directory: $entry"
                else
                  echo "  Warning: Source directory not found: $src_path"
                fi
                continue
              fi

              # Warn if target exists but was not in any previous manifest tier
              if [ -f "$tgt_path" ] && [ -f "$DOWNSTREAM_MANIFEST" ]; then
                IN_OLD_MANIFEST=$(jq -r --arg entry "$entry" '
                  if (.files | type) == "array" then [.files[]]
                  else [.files[][]]
                  end | index($entry)
                ' "$DOWNSTREAM_MANIFEST" 2>/dev/null || echo "null")
                if [ "$IN_OLD_MANIFEST" = "null" ]; then
                  WARNINGS="${WARNINGS}- **Warning**: Overwriting '${entry}' which was not previously in the manifest\n"
                fi
              fi

              # Create target directory if needed and copy file
              mkdir -p "$(dirname "$tgt_path")"
              cp "$src_path" "$tgt_path"
            done
          done

          # ── Update downstream manifest ──
          # Take upstream files sections, preserve downstream opted_in, update metadata
          SYNCED_AT=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          jq --arg version "$VERSION" \
             --arg synced_at "$SYNCED_AT" \
             --argjson opted_in "$DOWNSTREAM_OPTED_IN" \
             '.core_version = $version | .synced_at = $synced_at | .opted_in = $opted_in' \
             "$UPSTREAM_MANIFEST" > target/scripts/.core-manifest.json

          # ── Check for changes ──
          cd target
          if [ -z "$(git status --porcelain)" ]; then
            echo "No changes to sync"
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # ── Commit and push ──
          echo "has_changes=true" >> "$GITHUB_OUTPUT"
          if [ -n "$WARNINGS" ]; then
            echo "warnings<<EOF" >> "$GITHUB_OUTPUT"
            echo -e "$WARNINGS" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          fi

          git add scripts/core/ scripts/.core-manifest.json
          if [ -d .claude/commands/ ]; then
            git add .claude/commands/
          fi
          if [ -d .kit/ ]; then
            git add .kit/
          fi
          git commit -m "chore: Sync core scripts v${VERSION} from agentive-starter-kit"
          git push -u origin "$BRANCH"

      - name: Create PR
        if: steps.sync.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
          WARNINGS: ${{ steps.sync.outputs.warnings }}
        run: |
          VERSION=$(cat source/scripts/core/VERSION)
          cd target
          BRANCH=$(git branch --show-current)

          BODY="Automated sync of core scripts, commands, and builder layer from agentive-starter-kit v${VERSION}.

          ## What's synced

          This PR updates files listed in \`.core-manifest.json\`:
          - **scripts_core**: Core scripts in \`scripts/core/\`
          - **commands_core**: Slash commands that depend on core scripts
          - **commands_optional**: Only if your repo has opted in via \`opted_in\` in the manifest
          - **kit_builder**: Builder layer (\`.kit/\`) — only synced to kit repos (\`is_kit: true\`)

          Files not listed in the manifest are **never touched** by this sync.

          ## Opting in to optional tiers

          To receive optional commands (e.g., \`/babysit-pr\`, \`/retro\`), add
          \`\"commands_optional\"\` to the \`opted_in\` array in \`scripts/.core-manifest.json\`.

          The \`kit_builder\` tier syncs automatically to kit repos and does not require opt-in.

          ${WARNINGS:+## Warnings
          ${WARNINGS}}

          **Source**: movito/agentive-starter-kit@main
          **Core version**: ${VERSION}
          **ADR**: KIT-ADR-0022 (Manifest-Based Sync Ownership)"

          gh pr create \
            --title "chore: Sync core scripts v${VERSION} from agentive-starter-kit" \
            --body "$BODY" \
            --base main
